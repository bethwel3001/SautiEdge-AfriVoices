model:
  name: "openai/whisper-small"
  languages:
    - name: "Swahili"
      code: "swa"
    - name: "Kikuyu"
      code: "kik"
    - name: "Luo"
      code: "luo"
    - name: "Somali"
      code: "som"
    - name: "Maasai"
      code: "mas"
    - name: "Kalenjin"
      code: "kln"
  max_parameters: 1000000000 # Under 1 Billion

training:
  batch_size: 16
  learning_rate: 1e-4
  epochs: 20
  lora_rank: 8
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj"]

edge_optimization:
  quantization_type: "int8"
  target_rtf: 2.0
  backend: "onnxruntime"

decoding:
  beam_size: 5
  lm_weight: 0.8
  word_score: -0.5
